<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>[Star Savior] Gear Substats Checker</title>
  </head>
  <body>
    <h2>Gear Substats Checker</h2>

    <form id="gearForm">
      <div>
        <label>Attack: </label>
        <input type="number" id="attack" step="any" />
      </div>
      <br />

      <div>
        <label>Defense: </label>
        <input type="number" id="defense" step="any" />
      </div>
      <br />

      <div>
        <label>HP: </label>
        <input type="number" id="hp" step="any" />
      </div>
      <br />

      <div>
        <label>Speed: </label>
        <input type="number" id="speed" step="any" />
      </div>
      <br />

      <div>
        <label>Crit Rate: </label>
        <input type="number" id="critRate" step="any" />
      </div>
      <br />

      <div>
        <label>Crit Damage: </label>
        <input type="number" id="critDamage" step="any" />
      </div>
      <br />

      <div>
        <label>Effect Hit: </label>
        <input type="number" id="effectHit" step="any" />
      </div>
      <br />

      <div>
        <label>Effect Resist: </label>
        <input type="number" id="effectResist" step="any" />
      </div>
      <br />

      <button type="button" onclick="calculateScore()">Submit</button>
      <button type="button" onclick="resetForm()">Reset</button>
    </form>

    <hr />

    <h3>Result:</h3>
    <p>Max: 90 (100%)</p>
    <div id="display">Gear Score: 0 (0%)</div>

    <script>
      function calculateScore() {
        const val = (id) => parseFloat(document.getElementById(id).value) || 0;
        const atk = val("attack");
        const def = val("defense");
        const hp = val("hp");
        const spd = val("speed");
        const cr = val("critRate");
        const cd = val("critDamage");
        const eh = val("effectHit");
        const er = val("effectResist");

        const gearScore =
          (spd / 1 +
            atk / 1.6 +
            def / 1.6 +
            hp / 1.6 +
            cr / 2 +
            cd / 3 +
            eh / 3 +
            er / 3) *
          10;

        const percentage = (gearScore / 90) * 100;

        document.getElementById("display").innerText =
          "Gear Score: " +
          gearScore.toFixed(2) +
          " (" +
          percentage.toFixed(2) +
          "%)";
      }

      function resetForm() {
        document.getElementById("gearForm").reset();
        document.getElementById("display").innerText = "Gear Score: 0 (0%)";
      }
    </script>
  </body>
</html>
